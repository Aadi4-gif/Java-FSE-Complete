<div class="form-container">

  <h2>Student Enrollment Form</h2>

  <!-- Success Message -->

  <div
    class="success-message"
    *ngIf="submitted"
  >
    Enrollment request submitted successfully!
  </div>

  <form
    #enrollForm="ngForm"
    (ngSubmit)="onSubmit(enrollForm)"
  >

    <!-- Student Name -->

    <div class="form-group">

      <label>Student Name</label>

      <input
        type="text"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel"
      />

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']"
      >
        Name is required
      </span>

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']"
      >
        Name must be at least 3 characters
      </span>

    </div>

    <!-- Email -->

    <div class="form-group">

      <label>Email Address</label>

      <input
        type="email"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel"
      />

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']"
      >
        Email is required
      </span>

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']"
      >
        Enter a valid email address
      </span>

    </div>

    <!-- Course ID -->

    <div class="form-group">

      <label>Course ID</label>

      <input
        type="number"
        name="courseId"
        [(ngModel)]="courseId"
        required
        #courseCtrl="ngModel"
      />

      <span
        class="error"
        *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']"
      >
        Course ID is required
      </span>

    </div>

    <!-- Semester -->

    <div class="form-group">

      <label>Preferred Semester</label>

      <select
        name="preferredSemester"
        [(ngModel)]="preferredSemester"
        required
        #semesterCtrl="ngModel"
      >

        <option value="">Select Semester</option>

        <option value="Odd">Odd</option>

        <option value="Even">Even</option>

      </select>

      <span
        class="error"
        *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']"
      >
        Please select a semester
      </span>

    </div>

    <!-- Terms -->

    <div class="checkbox-group">

      <input
        type="checkbox"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel"
      />

      <label>I agree to terms and conditions</label>

    </div>

    <span
      class="error"
      *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']"
    >
      You must accept the terms
    </span>

    <!-- Buttons -->

    <div class="button-group">

      <button
        type="submit"
        [disabled]="enrollForm.invalid"
      >
        Submit
      </button>

      <button
        type="button"
        class="reset-btn"
        (click)="enrollForm.resetForm(); submitted = false"
      >
        Reset
      </button>

    </div>

  </form>

</div>
